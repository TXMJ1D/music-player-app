 <!DOCTYPE html>
 <html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Music Widget</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div class ="app">
            <div class = "player">

                <div class="albumCover">
                    <div class = "coverImage"></div>
                </div>

                <p id = "songTitle">Song Name</p>

                <!-- <input type="range" class="progressBar" min="0" max="100" value="0"> -->
                <div class="progressContainer">
                    <div class ="progressFill"></div>
                </div>

                <button class = "shuffleBtn"></button>

                <div class="buttons">
                    <button class = "prevBtn">⏮</button>
                    <button class = "playBtn"> ▶︎</button>
                    <button class = "skipBtn">⏭</button>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
